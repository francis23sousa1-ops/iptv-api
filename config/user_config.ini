[Settings]
; =========================
; Global Switches
; =========================

# True, False | Habilitar atualização; controla se o sistema irá atualizar os links; se desativado, todos os modos de funcionamento (obtenção de links e teste de desempenho) serão interrompidos; Valores possíveis: True, False
open_update = True

# source_file | Habilitar categoria para canais não correspondentes; canais não encontrados no source_file serão colocados diretamente nesta categoria e não participarão do processo de teste de desempenho
open_unmatch_category = False

# Habilitar categoria vazia, classifica automaticamente para o final; Valores possíveis: True, False
open_empty_category = False

# Habilitar exibição do horário de atualização; Valores possíveis: True, False
open_update_time = True

# Habilitar exibição de informações dos links (origem, resolução, protocolo, etc.); conteúdo após o símbolo $; alguns players (como PotPlayer) podem não suportar e falhar na reprodução; Valores possíveis: True, False
open_url_info = False

# Habilitar função EPG (guia de programação); Valores possíveis: True, False
open_epg = True

# Gerar resultados em formato m3u com suporte a ícones de canais; Valores possíveis: True, False
open_m3u_result = True

# Número de links por canal
urls_limit = 6

# Posição do horário de atualização (requer open_update_time); Valores possíveis: top, bottom
update_time_position = top

# Idioma do sistema; Valores possíveis: zh_CN, en
language = en


; =========================
; Scheduled Execution Settings
; =========================

# Modo de execução agendada; Valores possíveis: interval (por intervalo), time (horário específico)
update_mode = interval

# Intervalo de atualização em horas (válido apenas se interval); 0 ou vazio executa apenas uma vez; Padrão: 12
update_interval = 6

# Horários específicos (formato HH:MM, separados por vírgula)
#update_times =

# Executar atualização ao iniciar o programa; Valores possíveis: True, False
update_startup = True

# Fuso horário (define execução agendada e exibição de horário)
time_zone = Brazil/Brasília


; =========================
; Output & Service
; =========================

# Caminho do arquivo de modelo; Padrão: config/demo.txt
source_file = config/user_demo.txt

# Caminho do arquivo de resultado; Padrão: output/result.txt
final_file = output/user_result.txt

# Habilitar gravação em tempo real do arquivo de resultado (permite acessar os resultados durante o teste)
open_realtime_write = True

# Habilitar serviço de página (servidor web); usado para controlar se o serviço será iniciado; Valores possíveis: True, False
open_service = True

# Porta do serviço web; Padrão: 5180
app_port = 5180

# Protocolo público; Valores possíveis: http, https
public_scheme = http

# Endereço público (IP ou domínio); usado para gerar o endereço de acesso; padrão é o IP local
public_domain = 127.0.0.1

# CDN | Endereço de aceleração via proxy CDN para acessar fontes, ícones e outros recursos
#cdn_url =

# HTTP | Endereço de proxy HTTP para requisições de rede
#http_proxy =


; =========================
; Source Global Switches
; =========================

# Habilitar fonte local; utiliza dados do arquivo de modelo e do arquivo local (local.txt); Valores possíveis: True, False
open_local = True

# Habilitar fontes de assinatura; Valores possíveis: True, False
open_subscribe = True

# Habilitar desativação automática de fontes inválidas; quando falhar após tentativas, conteúdo vazio ou sem correspondência, adiciona # no início do endereço em `config/subscribe.txt` e `config/epg.txt`; Valores possíveis: True, False
open_auto_disable_source = True

# Fontes Avançadas de Busca (Scraping/IPs)
open_hotel = True
open_hotel_foodie = True
open_hotel_fofa = False
open_multicast = True
open_multicast_foodie = True
open_multicast_fofa = False
open_online_search = False

# Desativar automaticamente fontes inválidas após falhas
# open_auto_disable_source = True

# Usar requisições simples para verificação
open_request = False

# Habilitar uso de cache para acelerar o processo
open_use_cache = True

# Habilitar uso de resultados históricos (mesclando resultados anteriores)
open_history = True

# Ignorar resultados históricos mais antigos que X dias
recent_days = 15

# Habilitar uso de cabeçalhos de requisição presentes no M3U
open_headers = False

# Habilitar modo de compensação (adiciona links abaixo da média para evitar resultados vazios)
open_supply = True

# Habilitar uso de driver/navegador em segundo plano (se necessário para extração)
open_driver = False

; =========================
; Quantidade e Paginação de Resultados (Limits & Pagination)
; =========================

# Quantidade preferida de links por tipo de fonte no resultado final
local_num = 15
subscribe_num = 15
hotel_num = 15
multicast_num = 15
online_search_num = 0

# Número de páginas a pesquisar em fontes externas (FOFA/Foodie)
hotel_page_num = 2
multicast_page_num = 2
online_search_page_num = 1

# Filtro de região para buscas de IP (Deixe "全部" para buscar em todas as regiões)
hotel_region_list = 全部
multicast_region_list = 全部

; =========================
; Source Working Modes
; =========================

# Habilitar uso de resultados históricos (incluindo modelo e resultados anteriores), mesclando nesta atualização; Valores possíveis: True, False
# DUPLICADA:
# open_history = True

# Habilitar uso de cabeçalhos de requisição presentes no M3U (usado em testes, poucos players suportam); Valores possíveis: True, False
# DUPLICADA:
# open_headers = False


; =========================
; Filtering & Speed Test
; =========================

# Habilitar teste de desempenho (tempo de resposta, velocidade e resolução); Valores possíveis: True, False
open_speed_test = True

# Habilitar filtro por resolução; links abaixo da resolução mínima serão removidos (requer FFmpeg); Valores possíveis: True, False
open_filter_resolution = True

# Habilitar filtro por velocidade; links abaixo da velocidade mínima serão removidos; Valores possíveis: True, False
open_filter_speed = True

# Habilitar teste completo; testa todos os links do canal (exceto lista branca); se desativado, para ao atingir urls_limit
open_full_speed_test = True

# Habilitar modo de compensação; adiciona links que não atendem aos critérios (ex: velocidade baixa) para evitar resultados vazios; Valores possíveis: True, False
# DUPLICADA:
# open_supply = False

# Resolução mínima do link (requer open_filter_resolution)
min_resolution = 1280x720

# Resolução máxima do link (requer open_filter_resolution)
max_resolution = 3840x2160

# Velocidade mínima do link (unidade: M/s; megabytes por segundo; requer open_filter_speed)
min_speed = 0.5

# Mapeamento resolução:velocidade mínima
resolution_speed_map = 1280x720:0.2,1920x1080:0.5,3840x2160:1.0

# Número de testes simultâneos (concorrência); valores maiores reduzem tempo mas podem reduzir precisão
speed_test_limit = 5

# Tempo limite por teste (segundos); valores maiores aumentam quantidade de links mas reduzem qualidade
speed_test_timeout = 10

# Filtrar por host durante teste; links com mesmo host compartilham dados; reduz tempo mas pode afetar precisão
speed_test_filter_host = False

# Tempo limite de requisição (segundos); controla timeout e tentativas
request_timeout = 10


; =========================
; Network & Region Preferences
; =========================

# Forçar suporte a IPv6 (ignora detecção)
ipv6_support = False

# Tipo de IP no resultado; Valores possíveis: ipv4, ipv6, all
ipv_type = all

# Preferência de tipo de IP (prioriza na ordenação); Valores possíveis: ipv4, ipv6, auto
ipv_type_prefer = auto

# Localização dos links (filtro por palavras-chave, separadas por vírgula); vazio = sem filtro
location =

# Operadora dos links (filtro por palavras-chave); vazio = sem filtro
isp =


; =========================
; Result Ordering Preference
; =========================

# Preferência de origem dos links (ex: local,subscribe); ordenação segue essa prioridade; vazio = ordenar por velocidade
origin_type_prefer = local,subscribe,hotel,multicast

; =========================
; Local Source
; =========================

# Quantidade preferida de links de fonte local no resultado
# DUPLICADA:
# local_num = 10


; =========================
; Subscription Source
; =========================

# Quantidade preferida de links de fontes de assinatura no resultado
# DUPLICADA:
# subscribe_num = 10


; =========================
; Channel Logo
; =========================

# Endereço da biblioteca de logos de canais
logo_url = https://www.xn--rgv465a.top/tvlogo

# Tipo de arquivo dos logos
logo_type = png


; =========================
; RTMP Push
; =========================

# Habilitar RTMP push (requer FFmpeg); usa a banda local para melhorar a reprodução; Valores possíveis: True, False
open_rtmp = True

# Porta HTTP do Nginx (para encaminhamento RTMP); Padrão: 8080
nginx_http_port = 8080

# Porta RTMP do Nginx (para encaminhamento RTMP); Padrão: 1935
nginx_rtmp_port = 1935

# Tempo para parar transmissão inativa (segundos)
rtmp_idle_timeout = 300

# Número máximo de transmissões simultâneas
rtmp_max_streams = 10

# Modo de transcodificação: copy (sem transcodificar, menor uso de CPU) ou auto (melhor compatibilidade, maior uso de CPU)
rtmp_transcode_mode = copy
